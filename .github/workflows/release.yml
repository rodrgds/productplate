name: Release Product Plate

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_OPTIONS: --max_old_space_size=6144
  PUBLIC_CONVEX_URL: https://agreeable-otter-123.convex.cloud
  PUBLIC_CONVEX_SITE_URL: https://agreeable-otter-123.convex.site
  SITE_URL: https://release.example.com
  BETTER_AUTH_URL: https://release.example.com
  BETTER_AUTH_SECRET: release-build-secret-that-is-never-deployed

jobs:
  profiles:
    uses: ./.github/workflows/profile-matrix.yml

  release:
    needs: profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - run: bun install --frozen-lockfile
      - run: bun run verify:full
      - run: bun run verify
        working-directory: packages/create-product-plate

      - name: Validate tag and prepare release assets
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: bun run release:assets -- "${RELEASE_VERSION#v}"

      - name: Publish create-product-plate
        working-directory: packages/create-product-plate
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public

      - name: Attest release archive
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/release/product-plate-*.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/release/* --generate-notes --verify-tag
