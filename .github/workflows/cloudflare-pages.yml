name: Convex and Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy isolated stack
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
    env:
      NODE_OPTIONS: --max_old_space_size=6144
      CONVEX_DEPLOY_KEY: ${{ github.event_name == 'pull_request' && secrets.CONVEX_PREVIEW_DEPLOY_KEY || secrets.CONVEX_PRODUCTION_DEPLOY_KEY }}
      SITE_URL: ${{ github.event_name == 'pull_request' && format('https://{0}.{1}.pages.dev', github.head_ref, vars.CLOUDFLARE_PROJECT_NAME || 'productplate') || vars.SITE_URL }}
      BETTER_AUTH_URL: ${{ github.event_name == 'pull_request' && format('https://{0}.{1}.pages.dev', github.head_ref, vars.CLOUDFLARE_PROJECT_NAME || 'productplate') || vars.SITE_URL }}
      BETTER_AUTH_SECRET: 'ci-build-only-secret-not-used-at-runtime'
      PUBLIC_CONVEX_URL: ${{ vars.PUBLIC_CONVEX_URL }}
      PUBLIC_CONVEX_SITE_URL: ${{ vars.PUBLIC_CONVEX_SITE_URL }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify deploy keys are isolated
        env:
          PREVIEW_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          PRODUCTION_KEY: ${{ secrets.CONVEX_PRODUCTION_DEPLOY_KEY }}
        run: |
          test -n "$CONVEX_DEPLOY_KEY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$PREVIEW_KEY" = "$PRODUCTION_KEY" ]; then
            echo "Preview and production Convex deploy keys must differ." >&2
            exit 1
          fi

      - name: Verify source before deployment
        run: bun run verify

      - name: Build, then deploy Convex
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun convex deploy --cmd "bun scripts/build-for-convex.ts" --cmd-url-env-var-name PUBLIC_CONVEX_URL --preview-name "${{ github.head_ref }}" --message "${{ github.sha }}"
          else
            bun convex deploy --cmd "bun scripts/build-for-convex.ts" --cmd-url-env-var-name PUBLIC_CONVEX_URL --message "${{ github.sha }}"
          fi

      - name: Configure demo creation secret
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'productplate' }}
          DEMO_CREATION_SECRET: ${{ secrets.DEMO_CREATION_SECRET }}
        run: |
          test -n "$DEMO_CREATION_SECRET"
          printf '%s' "$DEMO_CREATION_SECRET" | bunx wrangler pages secret put DEMO_CREATION_SECRET --project-name="$CLOUDFLARE_PROJECT_NAME"

      - name: Deploy built artifact to Cloudflare Pages
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.110.0'
          command: pages deploy .svelte-kit/cloudflare --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'productplate' }} --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke deployed profile
        env:
          DEPLOYED_URL: ${{ steps.cloudflare-deploy.outputs.deployment-url }}
        run: bun scripts/smoke-deploy.ts

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deployment"
            echo "- Frontend: ${{ steps.cloudflare-deploy.outputs.deployment-url }}"
            echo "- Convex: ${{ github.event_name == 'pull_request' && 'isolated branch preview' || 'production' }}"
            echo "- Git SHA: ${{ github.sha }}"
            echo "- Smoke: ${{ job.status }}"
            echo "- Rollback: redeploy the previous Git SHA. Keep Convex changes backward compatible through widen-migrate-narrow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add or update preview comment
        if: github.event_name == 'pull_request' && steps.cloudflare-deploy.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- product-plate-preview -->';
            const body = `${marker}\nPreview: ${{ steps.cloudflare-deploy.outputs.deployment-url }}\nConvex: isolated branch deployment\nGit: ${{ github.sha }}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
